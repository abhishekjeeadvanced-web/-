<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Deep Black/Blue Rounded Background -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)" />
  
  <!-- Outer Target Ring -->
  <circle cx="256" cy="256" r="160" stroke="rgba(59, 130, 246, 0.2)" stroke-width="25" fill="none" />
  
  <!-- Inner Target Ring Glowing -->
  <circle cx="256" cy="256" r="100" stroke="url(#blueGlow)" stroke-width="20" fill="none" filter="url(#glow)" />
  
  <!-- Center Bullseye -->
  <circle cx="256" cy="256" r="45" fill="url(#blueGlow)" filter="url(#glow)" />
  
  <!-- Crosshairs -->
  <path d="M 256 70 L 256 120 M 256 442 L 256 392 M 70 256 L 120 256 M 442 256 L 392 256" stroke="url(#blueGlow)" stroke-width="18" stroke-linecap="round" filter="url(#glow)"/>
</svg>